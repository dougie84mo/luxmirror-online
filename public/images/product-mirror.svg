<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="LUX smart mirror: tall full-length mirror with thin bezel, mounted on a warm minimalist salon wall.">
  <!--
    PLACEHOLDER: product-mirror.svg
    Swap with: real LUX product render or stand-in full-length premium mirror.
    Target aspect: 3:4 portrait, ~1600px tall.
    Midjourney prompt suggestion (from your brief):
      "minimalist full-length smart mirror with thin bezel in a modern salon,
       warm cinematic lighting, photorealistic, shallow depth of field"
  -->
  <defs>
    <linearGradient id="wallBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6ecdf"/>
      <stop offset="1" stop-color="#e2cdb1"/>
    </linearGradient>
    <radialGradient id="wallLight" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#fff6e2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fff6e2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1410"/>
      <stop offset="1" stop-color="#0a0706"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbb494"/>
      <stop offset="0.5" stop-color="#8e7355"/>
      <stop offset="1" stop-color="#3f3024"/>
    </linearGradient>
    <linearGradient id="floorTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9b18e"/>
      <stop offset="1" stop-color="#8a7152"/>
    </linearGradient>
    <linearGradient id="reflection" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Wall + soft key light -->
  <rect width="1200" height="1600" fill="url(#wallBg)"/>
  <rect width="1200" height="1600" fill="url(#wallLight)"/>

  <!-- Floor band -->
  <rect y="1340" width="1200" height="260" fill="url(#floorTone)"/>
  <line x1="0" y1="1340" x2="1200" y2="1340" stroke="#7a6041" stroke-width="2" opacity="0.5"/>

  <!-- Cast shadow on floor -->
  <ellipse cx="600" cy="1380" rx="280" ry="22" fill="#3a2a1a" opacity="0.45" filter="url(#softShadow)"/>

  <!-- Mirror shadow on wall (subtle) -->
  <rect x="298" y="118" width="610" height="1230" rx="14" fill="#000" opacity="0.08" filter="url(#softShadow)"/>

  <!-- Bezel -->
  <rect x="295" y="115" width="610" height="1230" rx="14" fill="url(#bezel)"/>
  <!-- Glass -->
  <rect x="313" y="133" width="574" height="1194" rx="6" fill="url(#glass)"/>

  <!-- Faint reflected silhouette inside mirror -->
  <g opacity="0.45">
    <ellipse cx="600" cy="600" rx="120" ry="150" fill="#1f1610"/>
    <path d="M460 700 Q600 640 740 700 L780 1300 L420 1300 Z" fill="#1a120c"/>
    <!-- Reflected pendant glow -->
    <circle cx="430" cy="320" r="22" fill="#ffd79a" opacity="0.55"/>
    <circle cx="430" cy="320" r="44" fill="#ffd79a" opacity="0.18"/>
  </g>

  <!-- Glass sheen / highlight -->
  <rect x="313" y="133" width="574" height="1194" rx="6" fill="url(#reflection)"/>
  <path d="M340 160 L500 160 L420 1100 L340 1100 Z" fill="#ffffff" opacity="0.07"/>

  <!-- Top-of-mirror UI hint (thin status line) -->
  <g transform="translate(380, 165)" opacity="0.55">
    <circle r="6" fill="#ffd79a"/>
    <rect x="14" y="-4" width="60" height="8" rx="3" fill="#ffe7c2"/>
    <rect x="84" y="-4" width="40" height="8" rx="3" fill="#ffe7c2" opacity="0.6"/>
  </g>

  <!-- Side console / shelf (small detail to anchor scale) -->
  <rect x="80" y="1180" width="180" height="160" fill="#3b2a1c"/>
  <rect x="80" y="1180" width="180" height="6" fill="#caa170" opacity="0.7"/>
  <rect x="105" y="1140" width="14" height="40" rx="2" fill="#caa170"/>
  <rect x="135" y="1130" width="12" height="50" rx="2" fill="#9c7148"/>
  <rect x="165" y="1150" width="16" height="30" rx="2" fill="#e6c79a"/>

  <!-- Subtle wordmark in bezel (very low contrast) -->
  <text x="600" y="1310" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" letter-spacing="14" fill="#caa170" opacity="0.45">LUX</text>

  <!-- PLACEHOLDER mark -->
  <g opacity="0.22" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" fill="#1a1410">
    <text x="1168" y="1570" text-anchor="end" font-size="14" letter-spacing="2">PLACEHOLDER · PRODUCT-MIRROR</text>
  </g>
</svg>
