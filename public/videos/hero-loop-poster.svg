<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Poster frame placeholder for the hero background video loop.">
  <!--
    PLACEHOLDER: hero-loop-poster.svg
    Use as the `poster` attribute on the hero <video> until hero-loop.mp4 lands.
    Target: 10–30s muted autoplay loop, 1920x1080 H.264 mp4 (under ~6MB),
    same warm salon palette so the swap is seamless.
  -->
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2a22"/>
      <stop offset="1" stop-color="#120a08"/>
    </linearGradient>
    <radialGradient id="vwarm" cx="0.6" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#ffd9a8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffd9a8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vbg)"/>
  <rect width="1920" height="1080" fill="url(#vwarm)"/>
  <!-- Soft horizontal motion blur bars to hint moving footage -->
  <g opacity="0.18">
    <rect y="320" width="1920" height="2" fill="#fff4dd"/>
    <rect y="540" width="1920" height="2" fill="#fff4dd"/>
    <rect y="760" width="1920" height="2" fill="#fff4dd"/>
  </g>
  <!-- Center text -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" fill="#fff4dd" text-anchor="middle">
    <text x="960" y="520" font-size="36" letter-spacing="6" opacity="0.85">HERO LOOP</text>
    <text x="960" y="570" font-size="18" letter-spacing="3" opacity="0.55">10–30s muted autoplay · 1920×1080 · MP4</text>
  </g>
</svg>
